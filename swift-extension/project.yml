name: GreywallProxy
options:
  deploymentTarget:
    macOS: "12.0"
  bundleIdPrefix: io.greywall

settings:
  base:
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Manual
    PROVISIONING_PROFILE_SPECIFIER: ""

targets:
  GreywallProxy:
    type: application
    platform: macOS
    sources:
      - GreywallProxy
    info:
      path: GreywallProxy/Info.plist
      properties:
        LSUIElement: true
        NSSystemExtensionUsageDescription: "Greywall needs a system extension to transparently intercept network traffic from sandboxed processes."
    entitlements:
      path: GreywallProxy/GreywallProxy.entitlements
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_BUNDLE_IDENTIFIER: io.greywall.proxy
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: GreywallProxyExtension
        embed: true
        codeSign: true

  GreywallProxyExtension:
    type: system-extension
    platform: macOS
    sources:
      - GreywallProxyExtension
    info:
      path: GreywallProxyExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.app-proxy
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).TransparentProxyProvider
    entitlements:
      path: GreywallProxyExtension/GreywallProxyExtension.entitlements
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_BUNDLE_IDENTIFIER: io.greywall.proxy.extension
        SWIFT_VERSION: "5.9"
